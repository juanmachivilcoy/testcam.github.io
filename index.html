<!DOCTYPE html>
<html>
<body>
    <h3>Cuadrilla Chivilcel - Lector OCR</h3>
    <video id="video" autoplay playsinline style="width:100%; max-width: 400px;"></video>
    <br>
    <button onclick="startCamera('environment')">Cámara Trasera</button>
    <button onclick="scanText()">🔍 Leer Texto</button>
    
    <p id="resultado">Resultado: </p>
    <canvas id="canvas" style="display:none;"></canvas>

    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js'></script>
    
    <script>
        async function startCamera(facingMode) {
            const video = document.getElementById('video');
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { exact: facingMode } } });
            video.srcObject = stream;
        }

        async function scanText() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const resultado = document.getElementById('resultado');
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            resultado.innerText = "Analizando...";
            
            // Usamos Tesseract para leer el texto de la imagen del canvas
            Tesseract.recognize(canvas, 'spa', { logger: m => console.log(m) })
                .then(({ data: { text } }) => {
                    resultado.innerText = "Texto detectado: " + text;
                });
        }
    </script>
</body>
</html>
